<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block titulo %}{% endblock %}</title>

{% load static %}

<!-- CSS -->
<link href="{% static 'inicio/css/bootstrap.min.css' %}" rel="stylesheet">
<link href="{% static 'inicio/css/styles.css' %}" rel="stylesheet">
<link href="{% static 'inicio/css/icons.css' %}" rel="stylesheet">

<!-- ❌ QUITADO londinium-theme.css (pesado e innecesario si no lo usas) -->
<!-- <link href="{% static 'inicio/css/londinium-theme.css' %}" rel="stylesheet"> -->

<!-- Google Fonts optimizado -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css?family=Open+Sans:400,600&display=swap" rel="stylesheet">

<!-- JS optimizado -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
<script src="{% static 'inicio/js/bootstrap.min.js' %}" defer></script>

<!-- ❌ QUITADO porque rompe y no lo necesitas -->
<!-- <script src="{% static 'inicio/js/application.js' %}" defer></script> -->

</head>

<body>

<div class="page-container">

	<!-- NAV accesible -->
	<nav class="sidebar" aria-label="Menú principal">

		<div class="user-menu dropdown">
			<a href="#" aria-label="Perfil de usuario">
				<img src="{% block imagen %}{% endblock %}" alt="Imagen de usuario">
				<div class="user-info">
					{% block span %}{% endblock %}
				</div>
			</a>
		</div>

		<div class="sidebar-content">
			<ul class="navigation">
				<li><a href="{% url 'Principal' %}">Inicio</a></li>
				<li><a href="{% url 'Formulario' %}">Registrar alumno</a></li>	
				<li><a href="{% url 'Contacto' %}">Contacto</a></li>
				<li><a href="{% url 'Consulta' %}">Comentarios</a></li>
			</ul>
		</div>

	</nav>

</div>

<!-- CONTENIDO PRINCIPAL -->
<main class="page-content">

	{% block encavezado %}{% endblock %}

	<nav aria-label="Ruta de navegación">
		<ul class="breadcrumb">
			<li>
				<a href="{% url 'Principal' %}">
					{% if request.path == '/' %}
						Principal
					{% else %}
						Principal
					{% endif %}
				</a>
			</li>
		</ul>
	</nav>

	{% block contenido %}
	{% endblock %}

</main>

</body>
</html>
